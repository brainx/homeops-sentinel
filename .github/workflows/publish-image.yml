name: Publish image

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/homeops-sentinel-umbrel

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node.js
        # actions/setup-node v6
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run checks
        run: npm run check

      - name: Report release status
        run: npm run release:status

      - name: Run Docker smoke test
        run: npm run smoke:docker

  publish:
    needs: check
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read package version
        id: package
        run: node -e "console.log('version=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # docker/setup-qemu-action v4
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Install cosign
        # sigstore/cosign-installer v4.1.2
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Log in to GitHub Container Registry
        # docker/login-action v4
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        # docker/metadata-action v6
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.package.outputs.version }}
            type=ref,event=branch
            type=sha

      - name: Build and push image
        id: build
        # docker/build-push-action v7
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: mode=max
          sbom: true

      - name: Scan published image for blocking vulnerabilities
        # aquasecurity/trivy-action v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          version: v0.71.0
          hide-progress: true
          exit-code: "1"

      - name: Sign published image digest
        run: cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Write image digest handoff
        run: |
          mkdir -p .release
          {
            echo "repository=${{ env.IMAGE_NAME }}"
            echo "version=${{ steps.package.outputs.version }}"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "image=${{ env.IMAGE_NAME }}:${{ steps.package.outputs.version }}@${{ steps.build.outputs.digest }}"
            echo "platforms=linux/amd64,linux/arm64"
            echo "provenance=BuildKit registry provenance enabled with mode=max"
            echo "sbom=BuildKit registry SBOM attestation enabled"
            echo "cosign=keyless signature published through GitHub OIDC"
            echo "verify=cosign verify --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' --certificate-oidc-issuer https://token.actions.githubusercontent.com ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          } > .release/image-digest.txt

      - name: Upload image digest handoff
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: homeops-sentinel-image-digest
          path: .release/image-digest.txt
          retention-days: 30

      - name: Print image digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Use this in umbrel-app-store/homeops-sentinel/docker-compose.yml:"
          echo "${{ env.IMAGE_NAME }}:${{ steps.package.outputs.version }}@${{ steps.build.outputs.digest }}"
