name: Container Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Build image for scanning
        run: docker build --tag homeops-sentinel:scan .

      - name: Scan image for blocking vulnerabilities
        # aquasecurity/trivy-action v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: homeops-sentinel:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          version: v0.71.0
          hide-progress: true
          exit-code: "1"
